name: Claude Issue Triage

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    # Evita re-disparos por ediciones hechas por bots (incl. el propio Claude)
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read      # leer game.js/CLAUDE.md para el diagnóstico
      issues: write       # aplicar labels y comentar
      id-token: write     # requerido por claude-code-action (OIDC)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure base labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "bug" --color "d73a4a" --description "Algo no funciona como se espera" --force
          gh label create "enhancement" --color "a2eeef" --description "Nueva funcionalidad o mejora" --force
          gh label create "question" --color "d876e3" --description "Se necesita más información" --force
          gh label create "documentation" --color "0075ca" --description "Mejoras o adiciones a la documentación" --force
          gh label create "ui" --color "fbca04" --description "Relacionado con la interfaz visual" --force
          gh label create "gameplay" --color "0e8a16" --description "Relacionado con la lógica/mecánica del juego" --force
          gh label create "performance" --color "e99695" --description "Relacionado con rendimiento" --force
          gh label create "good-first-issue" --color "7057ff" --description "Buen punto de entrada para nuevos contribuidores" --force

      - name: Run Claude Issue Triage
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label list:*),Bash(gh label create:*),Read,Grep,Glob"'
          prompt: |
            Analiza el issue #${{ github.event.issue.number }} del repo ${{ github.repository }}.

            Contexto del proyecto: es un Tetris en vanilla JS (index.html, style.css, game.js);
            revisa CLAUDE.md y game.js si el issue lo requiere.

            Haz DOS cosas:

            1) LABELS: lee los labels existentes con `gh label list`. Asigna entre 1 y 3
               labels apropiados con `gh issue edit ${{ github.event.issue.number }} --add-label "..."`.
               Prioriza el set base (bug, enhancement, question, documentation, ui, gameplay,
               performance, good-first-issue). Solo crea un label nuevo con `gh label create`
               si ninguno existente encaja.

            2) DIAGNÓSTICO: publica UN comentario en el issue (en ESPAÑOL) con
               `gh issue comment ${{ github.event.issue.number }} --body "..."`. El comentario
               debe estar escrito en formato Markdown válido y bien interpretable por GitHub
               (encabezados, negritas, listas y bloques de código con la sintaxis de GitHub
               Flavored Markdown), siguiendo esta estructura:

               ## 🔍 Diagnóstico automático
               **Resumen:** ...
               **Causa probable / contexto técnico:** ...
               **Archivos/funciones probablemente afectados:** (ej. game.js → lockPiece)
               **Enfoque sugerido para la solución:** ...
               **Complejidad estimada:** baja | media | alta

            Si el issue ya tiene un comentario de diagnóstico previo (por una edición),
            actualiza el análisis publicando un nuevo comentario que refleje el cambio,
            indicando brevemente qué cambió respecto al issue.
